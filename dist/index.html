  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ee00ff",
            "accent-cyan": "#00f2ff",
            "background-light": "#f8f5f8",
            "background-dark": "#0a0a1a",
            neon: { blue: '#00f3ff', pink: '#bc13fe', purple: '#5e17eb' }
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          animation: {
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'spin-slow': 'spin 3s linear infinite',
            'fadeIn': 'fadeIn 0.5s ease-out forwards'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
          }
        }
      }
    }
  </script>
  <style>
    html,
    body {
      height: 100%;
      background-color: #020617;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-y: auto;
      overscroll-behavior-y: none;
      font-family: 'Inter', sans-serif;
    }

    #root {
      width: 100vw;
      min-height: 100vh;
    }

    .splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020617;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .splash-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-card-vivid {
      background: linear-gradient(135deg, rgba(238, 0, 255, 0.04) 0%, rgba(0, 242, 255, 0.04) 100%);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .cyan-glow {
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
    }

    /* Subtle animated gradient background for premium feel */
    .dark .bg-background-dark {
      background: linear-gradient(160deg, #0a0a1a 0%, #0d0d2b 40%, #0a0a1a 70%, #0f0a1f 100%);
    }
  </style>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>

</head>

<body class="text-slate-100 antialiased">
  <div id="root">
    <div class="splash-screen" id="splash">
      <div class="relative w-24 h-24 mb-6">
        <div class="absolute inset-0 border-4 border-neon-blue/20 rounded-full animate-spin-slow"></div>
        <img src="https://raw.githubusercontent.com/gillemosai/5taskProcrastinacaoZero/main/assets/5task-logo.png"
          class="absolute inset-4 w-16 h-16 object-contain animate-pulse-fast" alt="Logo">
      </div>
      <h1
        class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-neon-blue to-neon-purple">
        5TASK</h1>
    </div>
  </div>
  <script>
    window.addEventListener('app-ready', () => {
      document.getElementById('splash').classList.add('splash-hidden');
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered'))
          .catch(err => console.log('SW Error:', err));
      });
    }
  </script>
</body>

</html>
