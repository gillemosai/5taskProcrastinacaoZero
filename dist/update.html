<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atualizando 5Task...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: #f1f5f9;
      gap: 24px;
      padding: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #00f2ff;
      object-fit: cover;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(0, 242, 255, 0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(0, 242, 255, 0.2);
      border-top-color: #00f2ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    h1 {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, #00f2ff, #bc13fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
    }
    #status {
      font-size: 13px;
      color: #00f2ff;
      font-weight: 600;
      min-height: 20px;
    }
    .progress {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f2ff, #bc13fe);
      border-radius: 99px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <img
    src="https://raw.githubusercontent.com/gillemosai/5taskProcrastinacaoZero/main/assets/5task-logo.png"
    alt="5Task Logo"
    class="logo"
  />
  <h1>Atualizando 5Task</h1>
  <p>Limpando versão antiga e instalando a mais recente. Isso leva apenas alguns segundos...</p>
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <div id="status">Iniciando...</div>

  <script>
    const bar = document.getElementById('bar');
    const status = document.getElementById('status');

    function setProgress(pct, msg) {
      bar.style.width = pct + '%';
      status.textContent = msg;
    }

    async function clearEverything() {
      try {
        setProgress(10, 'Desregistrando Service Workers...');
        // Unregister all Service Workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const reg of registrations) {
            await reg.unregister();
          }
        }

        setProgress(40, 'Limpando caches antigos...');
        // Delete ALL caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
        }

        setProgress(70, 'Limpando dados locais...');
        // Clear sessionStorage (keep localStorage - user data)
        try { sessionStorage.clear(); } catch(e) {}

        setProgress(90, 'Redirecionando para versão nova...');

        await new Promise(r => setTimeout(r, 800));

        setProgress(100, 'Pronto! Carregando...');

        // Redirect to app with cache-busting param
        await new Promise(r => setTimeout(r, 400));
        window.location.replace('/?' + Date.now());

      } catch (err) {
        status.textContent = 'Erro: ' + err.message + ' - Redirecionando mesmo assim...';
        await new Promise(r => setTimeout(r, 1500));
        window.location.replace('/?' + Date.now());
      }
    }

    clearEverything();
  </script>
</body>
</html>
