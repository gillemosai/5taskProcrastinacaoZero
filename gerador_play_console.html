            theme: {
                extend: {
                    fontFamily: {

                        'brand-blue': '#00a8ff',

    <style>
        /* Base styles */
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
        }

        /* 1080x1920 Play Store standard output canvas */
        .screenshot-container {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            background-color: #070d19;
            transform-origin: top left;
        }
        
        /* Floating background elements */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.45;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .pattern-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            pointer-events: none;
        }

        .pattern-circles {
            position: absolute;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        /* Glassmorphism Styles matching 5task */
        .glass-card {
            background: rgba(13, 22, 41, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card-vivid {
            background: rgba(20, 35, 65, 0.85);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(0, 242, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 242, 255, 0.08);
        }

        /* Interactive Pointer Bubble Style (Drag and Drop Container) */
        .pointer-bubble {
            position: absolute;
            z-index: 90;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .pointer-bubble:active {
            cursor: grabbing;
            transform: scale(0.97);
        }

        /* Draggable Avatar Character Container */
        .avatar-container {
            position: absolute;
            z-index: 85; /* Sits slightly under the speech balloon if they overlap */
            cursor: grab;
            user-select: none;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .avatar-container:active {
            cursor: grabbing;
            transform: scale(0.97);
        }

        .avatar-frame {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.1);
            background: rgba(13, 22, 41, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .avatar-container:hover .avatar-frame {
            border-color: rgba(0, 242, 255, 0.5);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.35), 0 10px 35px rgba(0, 0, 0, 0.6);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .avatar-container:hover .avatar-img {
            transform: scale(1.06);
        }

        .avatar-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 8, 11, 0.95) 0%, rgba(5, 8, 11, 0.45) 40%, transparent 75%);
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0%, 100% {
                filter: drop-shadow(0 0 6px var(--glow-color)) drop-shadow(0 0 12px var(--glow-color));
                opacity: 0.9;
            }
            50% {
                filter: drop-shadow(0 0 12px var(--glow-color)) drop-shadow(0 0 24px var(--glow-color));
                opacity: 1;
            }
        }

        .pointer-arrow svg {
            animation: pulse-glow 2.5s infinite ease-in-out;
        }

        /* Phone mockup styling (Pixel-perfect scale & layout) */
        .phone-mockup {
            width: 820px;
            height: 1420px;
            background: #0d1629;
            border-radius: 54px;
            border: 14px solid #1e293b;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.6), 
                inset 0 0 0 3px rgba(255,255,255,0.05),
                inset 0 0 20px rgba(0,242,255,0.1);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 28px;
            background: #1e293b;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 50;
        }
        
        .phone-content {
            width: 100%;
            height: 100%;
            background-color: #070d19;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Preview Scaling (makes 1080x1920 grid fit in browser nicely) */
        .preview-scale {
            transform: scale(0.3333);
            margin-bottom: -1280px;
            margin-right: -720px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f293d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00f2ff;
        }
    </style>

        // Pointer Arrow Generator
        function getArrowMarkup(index) {
            const screen = screens[index];
            const p = screen.pointer;
            const direction = p.arrow;
            
            if (direction === 'none' || !direction) return '';
            
            const strokeColor = p.arrowColor || '#00f2ff';
            const angle = p.arrowAngle !== undefined ? p.arrowAngle : 0;
            const length = p.arrowLength !== undefined ? p.arrowLength : 70;
            const thickness = p.arrowThickness !== undefined ? p.arrowThickness : 5;
            
            const filter = `filter: drop-shadow(0 0 6px ${strokeColor}) drop-shadow(0 0 12px ${strokeColor});`;
            
            let positionClass = '';
            if (direction === 'baixo') {
                positionClass = 'absolute top-full left-1/2 -translate-x-1/2 pt-3';
            } else if (direction === 'cima') {
                positionClass = 'absolute bottom-full left-1/2 -translate-x-1/2 pb-3';
            } else if (direction === 'esquerda') {
                positionClass = 'absolute right-full top-1/2 -translate-y-1/2 pr-3';
            } else if (direction === 'direita') {
                positionClass = 'absolute left-full top-1/2 -translate-y-1/2 pl-3';
            }
            
            return `
                <div class="${positionClass} flex items-center justify-center pointer-events-none select-none z-50">
                    <svg width="${length}" height="${length}" viewBox="0 0 100 100" fill="none" style="${filter} transform: rotate(${angle}deg); transform-origin: 50% 50%; overflow: visible;">
                        <!-- Arrow shaft line -->
                        <path d="M 10,50 L 85,50" stroke="${strokeColor}" stroke-width="${thickness}" stroke-linecap="round"/>
                        <!-- Arrow head pointy part -->
                        <path d="M 65,30 L 85,50 L 65,70" stroke="${strokeColor}" stroke-width="${thickness}" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Glowing tip circle -->
                        <circle cx="85" cy="50" r="${thickness * 0.7}" fill="${strokeColor}"/>
                    </svg>
                </div>
            `;
        }

        function startDrag(e, index, type = 'balloon') {
            // Do not drag if clicking input or selectors
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
            
            if (e.cancelable) e.preventDefault();
            activeDragIndex = index;
            activeDragType = type;
            isDragging = true;

            const targetId = type === 'balloon' ? `render-pointer-${index}` : `render-avatar-${index}`;
            const bubble = document.getElementById(targetId);
            
            // Extract coordinates or fallback to default
            startLeft = parseFloat(bubble.style.left) || 0;
            startTop = parseFloat(bubble.style.top) || 0;
            
            const isTouch = e.type.startsWith('touch');
            startX = isTouch ? e.touches[0].clientX : e.clientX;
            startY = isTouch ? e.touches[0].clientY : e.clientY;

            if (!isTouch) {
                document.addEventListener('mousemove', onDrag);
                document.addEventListener('mouseup', stopDrag);
            } else {
                document.addEventListener('touchmove', onDragTouch, { passive: false });
                document.addEventListener('touchend', stopDrag);
            }
        }

            if (!isDragging || activeDragIndex === null || activeDragType === null) return;

            const targetId = activeDragType === 'balloon' ? `render-pointer-${activeDragIndex}` : `render-avatar-${activeDragIndex}`;
            const bubble = document.getElementById(targetId);
            const captureArea = document.getElementById(`capture-area-${activeDragIndex}`);

            // Compute exact scale ratio of CSS transform scale dynamically
            const rect = captureArea.getBoundingClientRect();
            const scale = rect.width / 1080;

            const deltaX = (e.clientX - startX) / scale;
            const deltaY = (e.clientY - startY) / scale;

            let newLeft = startLeft + deltaX;
            let newTop = startTop + deltaY;

            // Restrict bounds of the elements inside the 1080x1920 canvas
            newLeft = Math.max(-100, Math.min(1080 - 150, newLeft));
            newTop = Math.max(0, Math.min(1920 - 150, newTop));

            // Apply direct styles
            bubble.style.left = `${newLeft}px`;
            bubble.style.top = `${newTop}px`;

            // Keep local data synced
            const screen = screens[activeDragIndex];
            if (activeDragType === 'balloon') {
                screen.pointer.left = `${Math.round(newLeft)}px`;
                screen.pointer.top = `${Math.round(newTop)}px`;
                
                // Update coord tag in Sidebar
                const tag = document.getElementById(`coord-tag-${activeDragIndex}`);
                if (tag) tag.innerText = `X: ${Math.round(newLeft)}px | Y: ${Math.round(newTop)}px`;
            } else {
                screen.avatar.left = `${Math.round(newLeft)}px`;
                screen.avatar.top = `${Math.round(newTop)}px`;
                
                // Update avatar coord tag in Sidebar
                const tag = document.getElementById(`avatar-coord-tag-${activeDragIndex}`);
                if (tag) tag.innerText = `X: ${Math.round(newLeft)}px | Y: ${Math.round(newTop)}px`;
            }
        }

        function onDragTouch(e) {
            if (e.cancelable) e.preventDefault();
            const touch = e.touches[0];
            onDrag({
                clientX: touch.clientX,
                clientY: touch.clientY
            });
        }

            isDragging = false;
            activeDragIndex = null;
            activeDragType = null;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', onDragTouch);
            document.removeEventListener('touchend', stopDrag);

                        <div class="space-y-2">
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Lado da Seta</label>
                            <select onchange="updateScreenData(${index}, 'arrow', this.value)" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-slate-200 focus:border-brand-accent outline-none">
                                <option value="esquerda" ${screen.pointer.arrow === 'esquerda' ? 'selected' : ''}>← Esquerda</option>
                                <option value="direita" ${screen.pointer.arrow === 'direita' ? 'selected' : ''}>Direita →</option>
                                <option value="cima" ${screen.pointer.arrow === 'cima' ? 'selected' : ''}>↑ Cima</option>
                                <option value="baixo" ${screen.pointer.arrow === 'baixo' ? 'selected' : ''}>↓ Baixo</option>
                                <option value="none" ${screen.pointer.arrow === 'none' ? 'selected' : ''}>Ocultar Seta</option>
                            </select>
                        </div>
                    </div>

                    <!-- Customizable Seta Properties Block -->
                    <div class="p-3.5 bg-slate-900/60 rounded-xl border border-slate-800/80 space-y-3" id="arrow-props-panel-${index}">
                        <div class="flex items-center justify-between">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest font-mono">Customizar Seta</label>
                            <div class="flex items-center gap-1.5">
                                <span class="text-[9px] font-bold text-slate-500 font-mono">Cor:</span>
                                <input type="color" value="${screen.pointer.arrowColor || '#00f2ff'}" oninput="updateScreenData(${index}, 'arrowColor', this.value)" class="w-6 h-6 rounded-md bg-transparent border-0 cursor-pointer p-0 overflow-hidden outline-none">
                            </div>
                        </div>
                        
                        <div class="space-y-1.5">
                            <div class="flex justify-between text-[10px] font-semibold text-slate-400">
                                <span>Rotação (0-360°)</span>
                                <span id="arrow-angle-val-${index}" class="text-brand-accent font-mono font-bold">${screen.pointer.arrowAngle}°</span>
                            </div>
                            <input type="range" min="0" max="360" value="${screen.pointer.arrowAngle}" oninput="updateScreenData(${index}, 'arrowAngle', this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-brand-accent">
                        </div>

                        <div class="space-y-1.5">
                            <div class="flex justify-between text-[10px] font-semibold text-slate-400">
                                <span>Tamanho / Comprimento</span>
                                <span id="arrow-length-val-${index}" class="text-brand-accent font-mono font-bold">${screen.pointer.arrowLength}px</span>
                            </div>
                            <input type="range" min="40" max="160" value="${screen.pointer.arrowLength}" oninput="updateScreenData(${index}, 'arrowLength', this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-brand-accent">
                        </div>

                        <div class="space-y-1.5">
                            <div class="flex justify-between text-[10px] font-semibold text-slate-400">
                                <span>Espessura da Seta</span>
                                <span id="arrow-thickness-val-${index}" class="text-brand-accent font-mono font-bold">${screen.pointer.arrowThickness}px</span>
                            </div>
                            <input type="range" min="2" max="12" value="${screen.pointer.arrowThickness}" oninput="updateScreenData(${index}, 'arrowThickness', this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-brand-accent">
                        </div>
                    </div>

                    <!-- Customizable Rectangular Avatar Properties Block -->
                    <div class="p-3.5 bg-slate-900/60 rounded-xl border border-slate-800/80 space-y-3">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest font-mono">Customizar Avatar</label>
                        
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Nome no Badge</label>
                            <input type="text" value="${screen.avatar.name || 'Einstein'}" oninput="updateScreenData(${index}, 'avatarName', this.value)" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-slate-100 font-bold focus:border-brand-accent outline-none">
                        </div>

                        <div class="space-y-1.5">
                            <div class="flex justify-between text-[10px] font-semibold text-slate-400">
                                <span>Largura do Avatar</span>
                                <span id="avatar-width-val-${index}" class="text-brand-accent font-mono font-bold">${screen.avatar.width || 130}px</span>
                            </div>
                            <input type="range" min="80" max="240" value="${screen.avatar.width || 130}" oninput="updateScreenData(${index}, 'avatarWidth', this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-brand-accent">
                        </div>

                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Imagem do Personagem</label>
                            <div class="flex flex-col gap-2">
                                <label class="w-full bg-slate-950 hover:bg-slate-900 border border-slate-800 hover:border-brand-accent text-slate-300 px-3 py-2.5 rounded-lg text-xs font-semibold cursor-pointer transition-all text-center">
                                    <span>Upload Personagem Customizado</span>
                                    <input type="file" class="hidden" accept="image/*" onchange="loadCustomAvatar(event, ${index})">
                                </label>
                                ${screen.avatar.customUrl ? `
                                    <button onclick="removeCustomAvatar(${index})" class="w-full bg-rose-950/40 hover:bg-rose-900/60 border border-rose-500/30 text-rose-400 py-2.5 rounded-lg text-xs font-bold transition-all text-center">
                                        Restaurar Einstein Padrão
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                editorControls.appendChild(controlBlock);
            });
        }

        // Live updating data bindings
        function updateScreenData(index, property, value) {
            const screen = screens[index];
            if (property === 'title') {
                screen.title = value;
                document.getElementById(`render-title-${index}`).innerText = value;
            } else if (property === 'subtitle') {
                screen.subtitle = value;
                document.getElementById(`render-subtitle-${index}`).innerText = value;
            } else if (property === 'pointerText') {
                screen.pointer.text = value;
                updateBubble(index);
            } else if (property === 'avatar') {
                screen.pointer.avatar = value;
                updateBubble(index);
            } else if (property === 'arrow') {
                screen.pointer.arrow = value;
                updateBubble(index);
            } else if (property === 'arrowAngle') {
                screen.pointer.arrowAngle = parseInt(value);
                const valEl = document.getElementById(`arrow-angle-val-${index}`);
                if (valEl) valEl.innerText = `${value}°`;
                updateBubble(index);
            } else if (property === 'arrowLength') {
                screen.pointer.arrowLength = parseInt(value);
                const valEl = document.getElementById(`arrow-length-val-${index}`);
                if (valEl) valEl.innerText = `${value}px`;
                updateBubble(index);
            } else if (property === 'arrowThickness') {
                screen.pointer.arrowThickness = parseInt(value);
                const valEl = document.getElementById(`arrow-thickness-val-${index}`);
                if (valEl) valEl.innerText = `${value}px`;
                updateBubble(index);
            } else if (property === 'arrowColor') {
                screen.pointer.arrowColor = value;
                updateBubble(index);
            } else if (property === 'avatarName') {
                screen.avatar.name = value;
                updateBubble(index);
            } else if (property === 'avatarWidth') {
                screen.avatar.width = parseInt(value);
                const valEl = document.getElementById(`avatar-width-val-${index}`);
                if (valEl) valEl.innerText = `${value}px`;
                updateBubble(index);
            }
        }

        // Toggle pre-render vs local upload prints mode
        function toggleVisualMode() {
            visualMode = (visualMode === 'render') ? 'upload' : 'render';
            const btn = document.getElementById('btn-toggle-mode');
            
            if (visualMode === 'upload') {
                btn.innerHTML = `<svg class="w-5 h-5 text-brand-pink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Modo: Custom Print Upload`;
                
                screens.forEach((screen, index) => {
                    const content = document.getElementById(`phone-content-${index}`);
                    content.innerHTML = `
                        <div class="w-full h-full flex flex-col items-center justify-center text-center p-8 select-none">
                            <div class="w-20 h-20 rounded-full bg-slate-900 border-2 border-dashed border-slate-700 flex items-center justify-center mb-4 text-slate-400">
                                📷
                            </div>
                            <span class="text-sm font-bold text-slate-300">Faça Upload do Print Real</span>
                            <span class="text-xs text-slate-500 mt-2 block">Largura recomendada: 820px</span>
                        </div>
                    `;
                    content.style.backgroundImage = 'none';
                });
            } else {
                btn.innerHTML = `<svg class="w-5 h-5 text-brand-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg> Modo: Pre-render High-Fi UI`;
                
                screens.forEach((screen, index) => {
                    const content = document.getElementById(`phone-content-${index}`);
                    content.innerHTML = getPhoneUIMarkup(screen.uiType);
                    content.style.backgroundImage = 'none';
                });
            }
        }

        // Image file loading handler
        function loadImage(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = document.getElementById(`phone-content-${index}`);
                    content.innerHTML = '';
                    content.style.backgroundImage = `url('${e.target.result}')`;
                }
                reader.readAsDataURL(file);
            }
        }

        // Custom character avatar loading handler
        function loadCustomAvatar(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    screens[index].avatar.customUrl = e.target.result;
                    updateBubble(index);
                    renderAllWorkspace(); // redraw panel to display restore button
                }
                reader.readAsDataURL(file);
            }
        }

        // Custom character avatar removal handler
        function removeCustomAvatar(index) {
            screens[index].avatar.customUrl = null;
            updateBubble(index);
            renderAllWorkspace(); // redraw panel to hide restore button
        }

        // High resolution 1080x1920 snapshot download
        async function downloadScreenshot(index) {
            const element = document.getElementById(`capture-area-${index}`);
            
            // Remove browser preview scale factor and style overrides
            element.classList.remove('preview-scale');
            element.style.transform = 'none';
            
            // Generate canvas with exact device resolution (adding extra scale for razor sharpness)
            const canvas = await html2canvas(element, {
                scale: 1.5,
                width: 1080,
                height: 1920,
                backgroundColor: null,
                logging: false,
                useCORS: true // Allow loading assets from Raw GitHub
            });
            
            // Restore visual layout scale
            element.classList.add('preview-scale');
            element.style.transform = '';
            
            const link = document.createElement('a');
            link.download = `5task_playstore_screen_${index + 1}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Batch execution helper
        async function downloadAll() {
            for (let i = 0; i < screens.length; i++) {
                await downloadScreenshot(i);
                // Pause slightly to let browser breath
                await new Promise(r => setTimeout(r, 600));
            }
        }

        // Initial setup
        window.addEventListener('DOMContentLoaded', () => {
            renderAllWorkspace();
        });
    </script>
</body>
</html>
